<html>
  <head>
    <link rel="shortcut icon" href="https://www.iconarchive.com/download/i103363/paomedia/small-n-flat/calculator.1024.png" type="image/x-icon">
    <link rel="stylesheet" type="text/css" href="style.css"/>
    <title>Javascript Calculator</title>
  </head>
  <body>
    <div class="head"><h1>Calculator</h1></div>
    <div id="calculator">
      <div id="result">
        <div id="history">
          <p id="history-value"></p>
        </div>
        <div id="output">
          <p id="output-value"></p>
        </div>
      </div>
      <div id="keyboard" style="margin-top:25px";>
        <button class="number" id="clear">C</button>
        <button class="number" id="backspace">Clear</button>
        <button class="number" id="%">%</button>
        <button class="number" id="/">&#247;</button>
        <button class="number" id="7">7</button>
        <button class="number" id="8">8</button>
        <button class="number" id="9">9</button>
        <button class="number" id="*">&times;</button>
        <button class="number" id="4">4</button>
        <button class="number" id="5">5</button>
        <button class="number" id="6">6</button>
        <button class="number" id="-">-</button>
        <button class="number" id="1">1</button>
        <button class="number" id="2">2</button>
        <button class="number" id="3">3</button>
        <button class="number" id="+">+</button>
        <button class="number" id="(">(</button>
        <button class="number" id=")">)</button>
        <button class="number" id="0">0</button>
        <button class="number" id="=">=</button>
       
        <button class="empty" id="empty"></button>
        <button class="number" id=".">.</button>
        <button class="empty" id="empty"></button>
      </div>
    </div>
   

    <script src="script.js"></script>
  </body>
</html>
